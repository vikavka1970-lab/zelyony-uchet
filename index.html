<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зелёный Учёт — Калькулятор мастера</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#FDFCF8] text-[#1A3C34] selection:bg-lime-200 min-h-screen">
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useMemo } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const INCOME_CATEGORIES = ["Получено от клиента", "Другое"];
        const EXPENSE_CATEGORIES = ["На покупку саженцев", "На покупку инвентаря", "На покупку расходников", "На стройматериалы", "Мастеру за ...", "Еда", "Транспорт", "Развлечения", "Здоровье", "Одежда", "Другое"];
        const MONTHS = ["Январь", "Февраль", "Март", "Апрель", "Май", "Июнь", "Июль", "Август", "Сентябрь", "Октябрь", "Ноябрь", "Декабрь"];

        function App() {
            const [transactions, setTransactions] = useState(() => {
                const saved = localStorage.getItem('landscaping_transactions');
                return saved ? JSON.parse(saved) : [];
            });

            const [selectedMonth, setSelectedMonth] = useState(new Date().getMonth());
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [incAmount, setIncAmount] = useState('');
            const [incCategory, setIncCategory] = useState(INCOME_CATEGORIES[0]);
            const [incNote, setIncNote] = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expCategory, setExpCategory] = useState(EXPENSE_CATEGORIES[0]);
            const [expNote, setExpNote] = useState('');

            useEffect(() => {
                localStorage.setItem('landscaping_transactions', JSON.stringify(transactions));
            }, [transactions]);

            const addTransaction = (type) => {
                const amount = parseFloat(type === 'income' ? incAmount : expAmount);
                const category = type === 'income' ? incCategory : expCategory;
                const note = type === 'income' ? incNote : expNote;
                if (isNaN(amount) || amount <= 0) return;

                const now = new Date();
                const transactionDate = new Date(selectedYear, selectedMonth, now.getDate(), now.getHours(), now.getMinutes());
                const newTransaction = {
                    id: Math.random().toString(36).substr(2, 9),
                    amount,
                    category: note ? `${category} (${note})` : category,
                    date: transactionDate.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }),
                    timestamp: transactionDate.getTime(),
                    type
                };

                setTransactions(prev => [newTransaction, ...prev]);
                if (type === 'income') { setIncAmount(''); setIncNote(''); }
                else { setExpAmount(''); setExpNote(''); }
            };

            const deleteTransaction = (id) => setTransactions(prev => prev.filter(t => t.id !== id));

            const filteredTransactions = useMemo(() =>
                transactions.filter(t => {
                    const d = new Date(t.timestamp);
                    return d.getMonth() === selectedMonth && d.getFullYear() === selectedYear;
                }).sort((a, b) => b.timestamp - a.timestamp)
            , [transactions, selectedMonth, selectedYear]);

            const totals = useMemo(() => {
                const income = filteredTransactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
                const expenses = filteredTransactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
                return { income, expenses, balance: income - expenses };
            }, [filteredTransactions]);

            return React.createElement('div', { className: 'max-w-4xl mx-auto p-4 md:p-8' },

                // Header
                React.createElement('header', { className: 'text-center mb-10' },
                    React.createElement('h1', { className: 'text-4xl font-serif font-bold mb-2' }, 'Зелёный Учёт'),
                    React.createElement('p', { className: 'text-green-600 font-bold uppercase tracking-widest text-xs' }, 'Мастерская по озеленению')
                ),

                // Month Selector
                React.createElement('div', { className: 'bg-white p-6 rounded-3xl shadow-xl mb-8 flex flex-col items-center gap-4' },
                    React.createElement('div', { className: 'flex items-center gap-4' },
                        React.createElement('button', { onClick: () => setSelectedYear(y => y - 1), className: 'p-2 bg-gray-100 rounded-full hover:bg-gray-200' }, '←'),
                        React.createElement('span', { className: 'text-2xl font-bold' }, selectedYear),
                        React.createElement('button', { onClick: () => setSelectedYear(y => y + 1), className: 'p-2 bg-gray-100 rounded-full hover:bg-gray-200' }, '→')
                    ),
                    React.createElement('div', { className: 'flex flex-wrap justify-center gap-2' },
                        MONTHS.map((m, i) => React.createElement('button', {
                            key: m,
                            onClick: () => setSelectedMonth(i),
                            className: `px-3 py-1.5 rounded-xl text-sm font-extrabold transition-all ${selectedMonth === i ? 'bg-[#1A3C34] text-white' : 'bg-gray-100 text-gray-600 hover:bg-gray-200'}`
                        }, m))
                    )
                ),

                // Main Grid
                React.createElement('div', { className: 'grid grid-cols-1 md:grid-cols-2 gap-6 mb-8' },

                    // Income
                    React.createElement('div', { className: 'bg-[#1A3C34] p-6 rounded-[2rem] text-white' },
                        React.createElement('p', { className: 'text-lime-400 text-xs font-bold uppercase mb-1' }, 'Доход'),
                        React.createElement('h2', { className: 'text-3xl font-black mb-6' }, totals.income.toLocaleString(), ' ₽'),
                        React.createElement('div', { className: 'space-y-3' },
                            React.createElement('input', { type: 'number', placeholder: 'Сумма', value: incAmount, onChange: e => setIncAmount(e.target.value), className: 'w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white placeholder-white/50 outline-none focus:border-lime-400' }),
                            React.createElement('input', { type: 'text', placeholder: 'Примечание', value: incNote, onChange: e => setIncNote(e.target.value), className: 'w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white placeholder-white/50 outline-none focus:border-lime-400' }),
                            React.createElement('button', { onClick: () => addTransaction('income'), className: 'w-full bg-lime-400 text-[#1A3C34] font-bold py-3 rounded-xl hover:bg-lime-300 transition-colors' }, 'Добавить')
                        )
                    ),

                    // Expense
                    React.createElement('div', { className: 'bg-[#C05621] p-6 rounded-[2rem] text-white' },
                        React.createElement('p', { className: 'text-orange-200 text-xs font-bold uppercase mb-1' }, 'Расход'),
                        React.createElement('h2', { className: 'text-3xl font-black mb-6' }, totals.expenses.toLocaleString(), ' ₽'),
                        React.createElement('div', { className: 'space-y-3' },
                            React.createElement('input', { type: 'number', placeholder: 'Сумма', value: expAmount, onChange: e => setExpAmount(e.target.value), className: 'w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white placeholder-white/50 outline-none focus:border-orange-200' }),
                            React.createElement('select', { value: expCategory, onChange: e => setExpCategory(e.target.value), className: 'w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white outline-none focus:border-orange-200' },
                                EXPENSE_CATEGORIES.map(c => React.createElement('option', { key: c, value: c, className: 'text-black' }, c))
                            ),
                            React.createElement('input', { type: 'text', placeholder: 'Примечание (необязательно)', value: expNote, onChange: e => setExpNote(e.target.value), className: 'w-full p-3 rounded-xl bg-white/10 border border-white/10 text-white placeholder-white/50 outline-none focus:border-orange-200' }),
                            React.createElement('button', { onClick: () => addTransaction('expense'), className: 'w-full bg-white text-[#C05621] font-bold py-3 rounded-xl hover:bg-orange-50 transition-colors' }, 'Добавить')
                        )
                    )
                ),

                // Balance
                React.createElement('div', { className: 'bg-white p-8 rounded-[2rem] shadow-xl text-center mb-8' },
                    React.createElement('p', { className: 'text-gray-400 font-bold uppercase text-xs mb-2' }, 'Остаток за месяц'),
                    React.createElement('h2', { className: `text-5xl font-black ${totals.balance >= 0 ? 'text-[#1A3C34]' : 'text-red-600'}` }, totals.balance.toLocaleString(), ' ₽')
                ),

                // Transactions List
                filteredTransactions.length > 0
                    ? React.createElement('div', { className: 'bg-white rounded-[2rem] shadow-xl overflow-hidden' },
                        React.createElement('div', { className: 'p-6 border-b border-gray-100' },
                            React.createElement('h3', { className: 'font-bold text-lg' }, 'Записи за ', MONTHS[selectedMonth], ' ', selectedYear)
                        ),
                        React.createElement('div', { className: 'divide-y divide-gray-100' },
                            filteredTransactions.map(t =>
                                React.createElement('div', { key: t.id, className: 'flex items-center justify-between p-4 hover:bg-gray-50 transition-colors' },
                                    React.createElement('div', { className: 'flex items-center gap-3' },
                                        React.createElement('div', { className: `w-2 h-2 rounded-full flex-shrink-0 ${t.type === 'income' ? 'bg-lime-500' : 'bg-orange-500'}` }),
                                        React.createElement('div', null,
                                            React.createElement('p', { className: 'font-semibold text-sm' }, t.category),
                                            React.createElement('p', { className: 'text-gray-400 text-xs' }, t.date)
                                        )
                                    ),
                                    React.createElement('div', { className: 'flex items-center gap-3' },
                                        React.createElement('span', { className: `font-black ${t.type === 'income' ? 'text-[#1A3C34]' : 'text-[#C05621]'}` },
                                            t.type === 'income' ? '+' : '−', t.amount.toLocaleString(), ' ₽'
                                        ),
                                        React.createElement('button', {
                                            onClick: () => deleteTransaction(t.id),
                                            className: 'text-gray-300 hover:text-red-400 transition-colors text-lg leading-none',
                                            title: 'Удалить'
                                        }, '×')
                                    )
                                )
                            )
                        )
                    )
                    : React.createElement('div', { className: 'bg-white rounded-[2rem] shadow-xl p-10 text-center text-gray-400' },
                        React.createElement('p', { className: 'font-semibold' }, 'Записей за этот месяц пока нет')
                    )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
