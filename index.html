<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Зелёный Учёт">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/leaf.png">
    <title>Зелёный Учёт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #1A3C34;
            min-height: 100vh;
            color: white;
        }
        .font-serif { font-family: 'Playfair Display', serif; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* Cards */
        .card-income {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 2rem;
            border: 1px solid rgba(163, 230, 53, 0.15);
        }
        .card-expense {
            background: #C05621;
            border-radius: 2rem;
        }
        .card-white {
            background: rgba(255,255,255,0.07);
            border-radius: 2rem;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Inputs */
        .field-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.55;
            margin-bottom: 6px;
        }
        .field-input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.12);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.3); }
        .field-input:focus { border-color: rgba(255,255,255,0.35); }
        select.field-input option { background: #1A3C34; color: white; }

        /* Month tabs */
        .month-tabs {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .month-tabs::-webkit-scrollbar { display: none; }
        .month-tab {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.5);
            border: none;
        }
        .month-tab.active {
            background: #A3E635;
            color: #1A3C34;
        }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .fade-up { animation: fadeUp 0.3s ease both; }
        .fade-in { animation: fadeIn 0.2s ease both; }
        .scale-in { animation: scaleIn 0.25s cubic-bezier(.2,.8,.4,1) both; }

        /* Modal */
        .modal-bg {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: flex-end; justify-content: center; padding: 1rem;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s ease both;
        }
        @media (min-width: 640px) { .modal-bg { align-items: center; } }

        /* Today button */
        .btn-today {
            padding: 6px 16px;
            border-radius: 20px;
            background: #A3E635;
            color: #1A3C34;
            font-size: 0.8rem;
            font-weight: 800;
            border: none;
            cursor: pointer;
        }
        .btn-add {
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.15s;
        }
        .btn-add:active { opacity: 0.75; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useMemo, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const INCOME_CATS  = ["Получено от клиента", "Аванс", "Другое"];
        const EXPENSE_CATS = [
            "На покупку саженцев","На покупку инвентаря","На покупку расходников",
            "На стройматериалы","Мастеру за...","Еда","Транспорт","Здоровье","Одежда","Другое"
        ];
        const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь",
                        "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
        const KEY = 'landscaping_transactions';
        const fmt = n => Math.abs(n).toLocaleString('ru-RU');

        // ── Icons ──
        const PATHS = {
            leaf:     "M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12",
            trash:    "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2",
            gear:     "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z",
            download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
            upload:   "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
            plus:     "M12 5v14M5 12h14",
            x:        "M18 6 6 18M6 6l12 12",
            chevL:    "M15 18l-6-6 6-6",
            chevR:    "M9 18l6-6-6-6",
            trendUp:  "M23 6l-9.5 9.5-5-5L1 18M17 6h6v6",
            trendDn:  "M23 18l-9.5-9.5-5 5L1 6M17 18h6v-6",
            scale:    "M12 3v18M3 7h2c2 0 4-1 7-1s5 1 7 1h2M16 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1zM2 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z",
        };
        const Ico = ({ name, size = 20, stroke = "currentColor" }) =>
            React.createElement('svg', {
                width: size, height: size, viewBox: "0 0 24 24", fill: "none",
                stroke, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                style: { display: 'inline-block', flexShrink: 0 }
            }, React.createElement('path', { d: PATHS[name] }));

        // ── Settings Modal ──
        function SettingsModal({ transactions, setTransactions, onClose }) {
            const fileRef = useRef(null);

            const download = () => {
                const json = JSON.stringify({ version: 2, exported: new Date().toISOString(), transactions }, null, 2);
                const a = Object.assign(document.createElement('a'), {
                    href: URL.createObjectURL(new Blob([json], { type: 'application/json' })),
                    download: 'uchet_backup_' + new Date().toISOString().slice(0,10) + '.json'
                });
                a.click();
            };

            const upload = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        const data = Array.isArray(parsed) ? parsed : (parsed.transactions || []);
                        setTransactions(data);
                        onClose();
                    } catch { alert('Ошибка: неверный формат файла'); }
                };
                reader.readAsText(file);
            };

            const reset = () => {
                if (confirm('Удалить все записи? Это нельзя отменить.')) { setTransactions([]); onClose(); }
            };

            const btnBase = 'w-full flex items-center gap-3 p-4 rounded-2xl text-left transition-opacity hover:opacity-80';

            return React.createElement('div', { className: 'modal-bg', onClick: onClose },
                React.createElement('div', {
                    className: 'w-full max-w-sm card-white p-6 scale-in',
                    onClick: e => e.stopPropagation()
                },
                    React.createElement('div', { className: 'flex items-center justify-between mb-6' },
                        React.createElement('h2', { className: 'text-xl font-bold font-serif' }, 'Настройки'),
                        React.createElement('button', { onClick: onClose, className: 'p-2 rounded-full hover:bg-white/10' },
                            React.createElement(Ico, { name: 'x', size: 18 }))
                    ),
                    React.createElement('div', { className: 'space-y-3' },
                        React.createElement('button', {
                            onClick: download,
                            className: btnBase,
                            style: { background: 'rgba(163,230,53,0.1)', border: '1px solid rgba(163,230,53,0.2)' }
                        },
                            React.createElement(Ico, { name: 'download', size: 20, stroke: '#A3E635' }),
                            React.createElement('div', null,
                                React.createElement('p', { className: 'font-bold', style: { color: '#A3E635' } }, 'Сохранить в файл'),
                                React.createElement('p', { className: 'text-xs mt-0.5', style: { color: 'rgba(255,255,255,0.4)' } }, 'Скачать резервную копию .json')
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => fileRef.current?.click(),
                            className: btnBase,
                            style: { background: 'rgba(96,165,250,0.1)', border: '1px solid rgba(96,165,250,0.2)' }
                        },
                            React.createElement(Ico, { name: 'upload', size: 20, stroke: '#60a5fa' }),
                            React.createElement('div', null,
                                React.createElement('p', { className: 'font-bold text-blue-400' }, 'Загрузить из файла'),
                                React.createElement('p', { className: 'text-xs mt-0.5', style: { color: 'rgba(255,255,255,0.4)' } }, 'Восстановить из резервной копии')
                            )
                        ),
                        React.createElement('input', { ref: fileRef, type: 'file', accept: '.json', onChange: upload, className: 'hidden' }),
                        React.createElement('button', {
                            onClick: reset,
                            className: btnBase,
                            style: { background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.2)' }
                        },
                            React.createElement(Ico, { name: 'trash', size: 20, stroke: '#f87171' }),
                            React.createElement('div', null,
                                React.createElement('p', { className: 'font-bold text-red-400' }, 'Сбросить всё'),
                                React.createElement('p', { className: 'text-xs mt-0.5', style: { color: 'rgba(255,255,255,0.4)' } }, 'Удалить все записи безвозвратно')
                            )
                        )
                    ),
                    React.createElement('p', { className: 'text-center text-xs mt-5', style: { color: 'rgba(255,255,255,0.25)' } },
                        transactions.length + ' записей сохранено')
                )
            );
        }

        // ── Transaction Row ──
        function TxRow({ t, onDelete }) {
            return React.createElement('div', {
                className: 'flex items-center justify-between py-3 border-b fade-in',
                style: { borderColor: 'rgba(255,255,255,0.07)' }
            },
                React.createElement('div', { className: 'flex items-center gap-3 min-w-0' },
                    React.createElement('div', {
                        style: {
                            width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
                            background: t.type === 'income' ? '#A3E635' : '#fb923c'
                        }
                    }),
                    React.createElement('div', { className: 'min-w-0' },
                        React.createElement('p', { className: 'font-semibold text-sm truncate' }, t.category),
                        React.createElement('p', { className: 'text-xs mt-0.5', style: { color: 'rgba(255,255,255,0.35)' } }, t.date)
                    )
                ),
                React.createElement('div', { className: 'flex items-center gap-2 flex-shrink-0 ml-3' },
                    React.createElement('span', {
                        className: 'font-black text-sm',
                        style: { color: t.type === 'income' ? '#A3E635' : '#fb923c' }
                    }, t.type === 'income' ? '+' : '−', fmt(t.amount), '\u00a0₽'),
                    React.createElement('button', {
                        onClick: () => onDelete(t.id),
                        style: { background: 'rgba(239,68,68,0.2)', padding: '6px', borderRadius: '10px', border: 'none', cursor: 'pointer', flexShrink: 0 }
                    }, React.createElement(Ico, { name: 'trash', size: 14, stroke: '#f87171' }))
                )
            );
        }

        // ── App ──
        function App() {
            const [transactions, setTransactions] = useState(() => {
                try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
            });
            const [month, setMonth] = useState(new Date().getMonth());
            const [year,  setYear]  = useState(new Date().getFullYear());
            const [incAmount, setIncAmount] = useState('');
            const [incCat,    setIncCat]    = useState(INCOME_CATS[0]);
            const [incNote,   setIncNote]   = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expCat,    setExpCat]    = useState(EXPENSE_CATS[0]);
            const [expNote,   setExpNote]   = useState('');
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => { localStorage.setItem(KEY, JSON.stringify(transactions)); }, [transactions]);

            const addTx = useCallback((type) => {
                const amount = parseFloat(type === 'income' ? incAmount : expAmount);
                if (isNaN(amount) || amount <= 0) return;
                const cat  = type === 'income' ? incCat  : expCat;
                const note = type === 'income' ? incNote : expNote;
                const now  = new Date();
                const d    = new Date(year, month, now.getDate(), now.getHours(), now.getMinutes());
                setTransactions(prev => [{
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
                    amount, type,
                    category: note.trim() ? cat + ' (' + note.trim() + ')' : cat,
                    date: d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }),
                    timestamp: d.getTime()
                }, ...prev]);
                if (type === 'income') { setIncAmount(''); setIncNote(''); }
                else                   { setExpAmount(''); setExpNote(''); }
            }, [incAmount, expAmount, incCat, expCat, incNote, expNote, year, month]);

            const deleteTx = useCallback((id) => setTransactions(prev => prev.filter(t => t.id !== id)), []);

            const goToday = () => { setMonth(new Date().getMonth()); setYear(new Date().getFullYear()); };

            const filtered = useMemo(() =>
                transactions
                    .filter(t => { const d = new Date(t.timestamp); return d.getMonth() === month && d.getFullYear() === year; })
                    .sort((a, b) => b.timestamp - a.timestamp)
            , [transactions, month, year]);

            const totals = useMemo(() => {
                const inc = filtered.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
                const exp = filtered.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
                return { inc, exp, bal: inc - exp };
            }, [filtered]);

            const annual = useMemo(() => {
                const yt = transactions.filter(t => new Date(t.timestamp).getFullYear() === year);
                const inc = yt.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
                const exp = yt.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
                return { inc, exp, bal: inc - exp };
            }, [transactions, year]);

            const mn = MONTHS[month];

            return React.createElement('div', { style: { maxWidth: 520, margin: '0 auto', padding: '20px 16px 60px' } },

                // ── Header ──
                React.createElement('div', {
                    className: 'fade-up',
                    style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 28 }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
                        React.createElement('div', {
                            style: { width: 44, height: 44, borderRadius: 14, background: 'rgba(163,230,53,0.15)', display: 'flex', alignItems: 'center', justifyContent: 'center' }
                        }, React.createElement(Ico, { name: 'leaf', size: 22, stroke: '#A3E635' })),
                        React.createElement('div', null,
                            React.createElement('h1', { className: 'font-serif', style: { fontSize: '1.25rem', fontWeight: 800, lineHeight: 1 } }, 'Зелёный Учёт'),
                            React.createElement('p', { style: { fontSize: '0.65rem', fontWeight: 700, letterSpacing: '0.1em', color: 'rgba(255,255,255,0.4)', marginTop: 3 } }, 'МАСТЕРСКАЯ ПО ОЗЕЛЕНЕНИЮ')
                        )
                    ),
                    React.createElement('button', {
                        onClick: () => setShowSettings(true),
                        style: { width: 44, height: 44, borderRadius: 14, background: 'rgba(255,255,255,0.08)', border: '1px solid rgba(255,255,255,0.08)', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer' }
                    }, React.createElement(Ico, { name: 'gear', size: 18, stroke: 'rgba(255,255,255,0.5)' }))
                ),

                // ── Year + Month ──
                React.createElement('div', {
                    className: 'card-white fade-up',
                    style: { padding: '20px', marginBottom: 16, animationDelay: '0.05s' }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 } },
                        React.createElement('button', {
                            onClick: () => setYear(y => y-1),
                            style: { padding: '4px 8px', borderRadius: 8, background: 'rgba(255,255,255,0.08)', border: 'none', color: 'white', cursor: 'pointer', fontSize: '1rem' }
                        }, '←'),
                        React.createElement('span', { style: { fontWeight: 900, fontSize: '1.5rem', flex: 1 } }, year),
                        React.createElement('button', { className: 'btn-today', onClick: goToday }, 'сегодня'),
                        React.createElement('button', {
                            onClick: () => setYear(y => y+1),
                            style: { padding: '4px 8px', borderRadius: 8, background: 'rgba(255,255,255,0.08)', border: 'none', color: 'white', cursor: 'pointer', fontSize: '1rem' }
                        }, '→')
                    ),
                    React.createElement('div', { className: 'month-tabs' },
                        MONTHS.map((m, i) => React.createElement('button', {
                            key: m, onClick: () => setMonth(i),
                            className: 'month-tab' + (i === month ? ' active' : '')
                        }, m))
                    )
                ),

                // ── Income Card ──
                React.createElement('div', {
                    className: 'card-income fade-up',
                    style: { padding: '24px', marginBottom: 16, animationDelay: '0.1s' }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 20 } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Общий доход за ' + mn),
                            React.createElement('p', { style: { fontSize: '2.5rem', fontWeight: 900, lineHeight: 1.1 } }, fmt(totals.inc), '\u00a0₽')
                        ),
                        React.createElement(Ico, { name: 'trendUp', size: 28, stroke: '#A3E635' })
                    ),
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Сумма, ₽'),
                            React.createElement('input', { type: 'number', placeholder: '0', value: incAmount, onChange: e => setIncAmount(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('income'), className: 'field-input' })
                        ),
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Категория'),
                            React.createElement('select', { value: incCat, onChange: e => setIncCat(e.target.value), className: 'field-input' },
                                INCOME_CATS.map(c => React.createElement('option', { key: c, value: c }, c)))
                        ),
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Примечание'),
                            React.createElement('input', { type: 'text', placeholder: 'Название / Проект / Сад...', value: incNote, onChange: e => setIncNote(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('income'), className: 'field-input' })
                        ),
                        React.createElement('button', {
                            className: 'btn-add', onClick: () => addTx('income'),
                            style: { background: '#A3E635', color: '#1A3C34' }
                        },
                            React.createElement(Ico, { name: 'plus', size: 18, stroke: '#1A3C34' }),
                            'Добавить доход'
                        )
                    ),
                    // Income history
                    filtered.filter(t => t.type === 'income').length > 0 && React.createElement('div', { style: { marginTop: 20 } },
                        React.createElement('p', { className: 'field-label', style: { marginBottom: 8 } }, 'История доходов (' + mn + ')'),
                        filtered.filter(t => t.type === 'income').map(t => React.createElement(TxRow, { key: t.id, t, onDelete: deleteTx }))
                    )
                ),

                // ── Expense Card ──
                React.createElement('div', {
                    className: 'card-expense fade-up',
                    style: { padding: '24px', marginBottom: 16, animationDelay: '0.15s' }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 20 } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Потрачено в ' + mn),
                            React.createElement('p', { style: { fontSize: '2.5rem', fontWeight: 900, lineHeight: 1.1 } }, fmt(totals.exp), '\u00a0₽')
                        ),
                        React.createElement(Ico, { name: 'trendDn', size: 28, stroke: 'rgba(255,255,255,0.6)' })
                    ),
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 12 } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Сумма, ₽'),
                            React.createElement('input', { type: 'number', placeholder: '0', value: expAmount, onChange: e => setExpAmount(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('expense'), className: 'field-input' })
                        ),
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Категория'),
                            React.createElement('select', { value: expCat, onChange: e => setExpCat(e.target.value), className: 'field-input' },
                                EXPENSE_CATS.map(c => React.createElement('option', { key: c, value: c }, c)))
                        ),
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Детали расхода'),
                            React.createElement('input', { type: 'text', placeholder: 'За что именно...', value: expNote, onChange: e => setExpNote(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('expense'), className: 'field-input' })
                        ),
                        React.createElement('button', {
                            className: 'btn-add', onClick: () => addTx('expense'),
                            style: { background: 'rgba(255,255,255,0.15)', color: 'white', border: '1px solid rgba(255,255,255,0.2)' }
                        },
                            React.createElement(Ico, { name: 'plus', size: 18, stroke: 'white' }),
                            'Добавить расход'
                        )
                    ),
                    // Expense history
                    filtered.filter(t => t.type === 'expense').length > 0 && React.createElement('div', { style: { marginTop: 20 } },
                        React.createElement('p', { className: 'field-label', style: { marginBottom: 8 } }, 'История трат (' + mn + ')'),
                        filtered.filter(t => t.type === 'expense').map(t => React.createElement(TxRow, { key: t.id, t, onDelete: deleteTx }))
                    )
                ),

                // ── Balance ──
                React.createElement('div', {
                    className: 'card-white fade-up',
                    style: { padding: '20px 24px', marginBottom: 16, animationDelay: '0.2s' }
                },
                    React.createElement('p', { className: 'field-label' }, 'Остаток за ' + mn),
                    React.createElement('p', { style: { fontSize: '2rem', fontWeight: 900, color: totals.bal >= 0 ? '#A3E635' : '#f87171' } },
                        totals.bal < 0 ? '−' : '', fmt(totals.bal), '\u00a0₽')
                ),

                // ── Annual Report ──
                React.createElement('div', {
                    className: 'card-white fade-up',
                    style: { padding: '20px 24px', animationDelay: '0.25s' }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16 } },
                        React.createElement(Ico, { name: 'scale', size: 16, stroke: '#A3E635' }),
                        React.createElement('p', { className: 'field-label', style: { margin: 0 } }, 'Годовой отчёт ' + year)
                    ),
                    React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, textAlign: 'center' } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Доходы'),
                            React.createElement('p', { style: { fontWeight: 900, color: '#A3E635' } }, fmt(annual.inc), '\u00a0₽')
                        ),
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Расходы'),
                            React.createElement('p', { style: { fontWeight: 900, color: '#fb923c' } }, fmt(annual.exp), '\u00a0₽')
                        ),
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Итого'),
                            React.createElement('p', { style: { fontWeight: 900, color: annual.bal >= 0 ? 'white' : '#f87171' } },
                                annual.bal < 0 ? '−' : '', fmt(annual.bal), '\u00a0₽')
                        )
                    )
                ),

                // ── Settings Modal ──
                showSettings && React.createElement(SettingsModal, {
                    transactions, setTransactions, onClose: () => setShowSettings(false)
                })
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
