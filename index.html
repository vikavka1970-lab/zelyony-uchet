<!DOCTYPE html>
<html lang="ru" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="google" content="notranslate">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Зелёный Учёт">
    <link rel="apple-touch-icon" href="https://img.icons8.com/fluency/240/leaf.png">
    <title>Зелёный Учёт</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: #EEF7EC;
            color: #1A3C2A;
        }

        /* Декоративный фон — мягкий природный градиент */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(134,210,100,0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,160,60,0.10) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 20%, rgba(80,180,90,0.12) 0%, transparent 40%),
                #EEF7EC;
        }

        .font-serif { font-family: 'Playfair Display', serif; }

        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* Cards */
        .card-base {
            border-radius: 1.75rem;
            padding: 24px;
            margin-bottom: 14px;
        }
        .card-surface {
            background: #ffffff;
            box-shadow: 0 2px 16px rgba(30,90,40,0.08), 0 1px 3px rgba(30,90,40,0.05);
        }
        .card-income {
            background: linear-gradient(135deg, #1E7A3E 0%, #145C2C 100%);
            color: white;
            box-shadow: 0 4px 24px rgba(30,122,62,0.35);
        }
        .card-expense {
            background: linear-gradient(135deg, #E8560A 0%, #C44008 100%);
            color: white;
            box-shadow: 0 4px 24px rgba(232,86,10,0.30);
        }

        /* Inputs */
        .field-label {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.09em;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 6px;
            display: block;
        }
        .field-input {
            width: 100%;
            padding: 13px 15px;
            border-radius: 12px;
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .field-input::placeholder { color: rgba(255,255,255,0.4); }
        .field-input:focus { border-color: rgba(255,255,255,0.5); }
        select.field-input option { background: #1E7A3E; color: white; }

        .field-input-light {
            width: 100%;
            padding: 13px 15px;
            border-radius: 12px;
            background: #F3FAF0;
            border: 1.5px solid #C8E6C0;
            color: #1A3C2A;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .field-input-light:focus { border-color: #5DBE6E; }
        select.field-input-light option { background: #F3FAF0; }

        /* Month tabs */
        .month-tabs {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
        }
        .month-tab {
            padding: 7px 4px;
            border-radius: 12px;
            font-size: 0.78rem;
            font-weight: 700;
            cursor: pointer;
            border: none;
            text-align: center;
            transition: all 0.18s;
            background: rgba(30,122,62,0.1);
            color: #2D6A4A;
        }
        .month-tab:hover { background: rgba(30,122,62,0.18); }
        .month-tab.active { background: #1E7A3E; color: white; }

        /* Animations */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(14px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .fade-up { animation: fadeUp 0.32s ease both; }
        .scale-in { animation: scaleIn 0.25s cubic-bezier(.2,.8,.4,1) both; }

        /* Modal */
        .modal-bg {
            position: fixed; inset: 0; z-index: 50;
            display: flex; align-items: flex-end; justify-content: center; padding: 1rem;
            background: rgba(10,40,15,0.5);
            backdrop-filter: blur(6px);
            animation: fadeIn 0.2s ease both;
        }
        @media (min-width: 640px) { .modal-bg { align-items: center; } }

        /* Buttons */
        .btn-primary {
            width: 100%; padding: 14px; border-radius: 13px;
            font-weight: 800; font-size: 0.95rem; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.15s, transform 0.1s;
        }
        .btn-primary:active { opacity: 0.8; transform: scale(0.98); }

        .btn-today {
            padding: 6px 16px; border-radius: 20px;
            background: #1E7A3E; color: white;
            font-size: 0.78rem; font-weight: 800; border: none; cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn-today:hover { opacity: 0.85; }

        .btn-clear {
            width: 100%; padding: 14px; border-radius: 13px;
            font-weight: 700; font-size: 0.9rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            background: transparent;
            border: 1.5px solid #E8B4A0;
            color: #C44008;
            transition: background 0.15s;
        }
        .btn-clear:hover { background: rgba(232,86,10,0.06); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useMemo, useRef, useCallback } from 'https://esm.sh/react@18.2.0';
        import ReactDOM from 'https://esm.sh/react-dom@18.2.0/client';

        const INCOME_CATS  = ["Получено от клиента", "Аванс", "Другое"];
        const EXPENSE_CATS = [
            "На покупку саженцев","На покупку инвентаря","На покупку расходников",
            "На стройматериалы","Мастеру за...","Еда","Транспорт","Здоровье","Одежда","Другое"
        ];
        const MONTHS = ["Январь","Февраль","Март","Апрель","Май","Июнь",
                        "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
        const KEY = 'landscaping_transactions';
        const fmt = n => Math.abs(n).toLocaleString('ru-RU');

        // ── Icons ──
        const PATHS = {
            leaf:     "M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.78 10-10 10z M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12",
            trash:    "M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2",
            gear:     "M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z",
            download: "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3",
            upload:   "M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12",
            plus:     "M12 5v14M5 12h14",
            x:        "M18 6 6 18M6 6l12 12",
            chevL:    "M15 18l-6-6 6-6",
            chevR:    "M9 18l6-6-6-6",
            trendUp:  "M23 6l-9.5 9.5-5-5L1 18M17 6h6v6",
            trendDn:  "M23 18l-9.5-9.5-5 5L1 6M17 18h6v-6",
            scale:    "M12 3v18M3 7h2c2 0 4-1 7-1s5 1 7 1h2M16 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1zM2 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1z",
        };
        const Ico = ({ name, size = 20, stroke = "currentColor" }) =>
            React.createElement('svg', {
                width: size, height: size, viewBox: "0 0 24 24", fill: "none",
                stroke, strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round",
                style: { display: 'inline-block', flexShrink: 0 }
            }, React.createElement('path', { d: PATHS[name] }));

        // ── Settings Modal ──
        function SettingsModal({ transactions, setTransactions, onClose }) {
            const fileRef = useRef(null);

            const download = () => {
                const json = JSON.stringify({ version: 2, exported: new Date().toISOString(), transactions }, null, 2);
                const a = Object.assign(document.createElement('a'), {
                    href: URL.createObjectURL(new Blob([json], { type: 'application/json' })),
                    download: 'uchet_backup_' + new Date().toISOString().slice(0,10) + '.json'
                });
                a.click();
            };

            const upload = e => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const parsed = JSON.parse(ev.target.result);
                        const data = Array.isArray(parsed) ? parsed : (parsed.transactions || []);
                        setTransactions(data);
                        onClose();
                    } catch { alert('Ошибка: неверный формат файла'); }
                };
                reader.readAsText(file);
            };

            return React.createElement('div', { className: 'modal-bg', onClick: onClose },
                React.createElement('div', {
                    className: 'scale-in card-base card-surface',
                    style: { width: '100%', maxWidth: 380, marginBottom: 0 },
                    onClick: e => e.stopPropagation()
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 20 } },
                        React.createElement('h2', { className: 'font-serif', style: { fontSize: '1.2rem', fontWeight: 800 } }, 'Настройки'),
                        React.createElement('button', {
                            onClick: onClose,
                            style: { padding: 8, borderRadius: 10, background: '#F3FAF0', border: 'none', cursor: 'pointer' }
                        }, React.createElement(Ico, { name: 'x', size: 16, stroke: '#1A3C2A' }))
                    ),
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 10 } },
                        React.createElement('button', {
                            onClick: download,
                            style: { display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', borderRadius: 14, background: '#F0FBF0', border: '1.5px solid #B8E6C0', cursor: 'pointer', textAlign: 'left' }
                        },
                            React.createElement(Ico, { name: 'download', size: 20, stroke: '#1E7A3E' }),
                            React.createElement('div', null,
                                React.createElement('p', { style: { fontWeight: 700, color: '#1E7A3E', fontSize: '0.9rem' } }, 'Сохранить в файл'),
                                React.createElement('p', { style: { fontSize: '0.75rem', color: '#6A9A7A', marginTop: 2 } }, 'Скачать резервную копию .json')
                            )
                        ),
                        React.createElement('button', {
                            onClick: () => fileRef.current?.click(),
                            style: { display: 'flex', alignItems: 'center', gap: 12, padding: '14px 16px', borderRadius: 14, background: '#EFF6FF', border: '1.5px solid #BFDBFE', cursor: 'pointer', textAlign: 'left' }
                        },
                            React.createElement(Ico, { name: 'upload', size: 20, stroke: '#3B82F6' }),
                            React.createElement('div', null,
                                React.createElement('p', { style: { fontWeight: 700, color: '#2563EB', fontSize: '0.9rem' } }, 'Загрузить из файла'),
                                React.createElement('p', { style: { fontSize: '0.75rem', color: '#6B9FD4', marginTop: 2 } }, 'Восстановить из резервной копии')
                            )
                        ),
                        React.createElement('input', { ref: fileRef, type: 'file', accept: '.json', onChange: upload, style: { display: 'none' } })
                    ),
                    React.createElement('p', { style: { textAlign: 'center', fontSize: '0.72rem', color: '#9AB8A0', marginTop: 16 } },
                        transactions.length + ' записей сохранено')
                )
            );
        }

        // ── Transaction Row ──
        function TxRow({ t, onDelete, onLight }) {
            const isInc = t.type === 'income';
            return React.createElement('div', {
                style: {
                    display: 'flex', alignItems: 'center', justifyContent: 'space-between',
                    paddingTop: 11, paddingBottom: 11,
                    borderBottom: '1px solid ' + (onLight ? 'rgba(30,122,62,0.08)' : 'rgba(255,255,255,0.1)')
                }
            },
                React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, minWidth: 0 } },
                    React.createElement('div', { style: {
                        width: 8, height: 8, borderRadius: '50%', flexShrink: 0,
                        background: onLight ? (isInc ? '#1E7A3E' : '#E8560A') : 'rgba(255,255,255,0.6)'
                    }}),
                    React.createElement('div', { style: { minWidth: 0 } },
                        React.createElement('p', { style: { fontWeight: 600, fontSize: '0.875rem', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, t.category),
                        React.createElement('p', { style: { fontSize: '0.72rem', opacity: 0.45, marginTop: 2 } }, t.date)
                    )
                ),
                React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0, marginLeft: 8 } },
                    React.createElement('span', { style: { fontWeight: 900, fontSize: '0.875rem', color: onLight ? (isInc ? '#1E7A3E' : '#E8560A') : 'rgba(255,255,255,0.9)' } },
                        isInc ? '+' : '−', fmt(t.amount), '\u00a0₽'),
                    React.createElement('button', {
                        onClick: () => onDelete(t.id),
                        style: { padding: 6, borderRadius: 9, border: 'none', cursor: 'pointer', flexShrink: 0, background: 'rgba(200,60,20,0.15)' }
                    }, React.createElement(Ico, { name: 'trash', size: 13, stroke: onLight ? '#C44008' : 'rgba(255,200,180,0.9)' }))
                )
            );
        }

        // ── App ──
        function App() {
            const [transactions, setTransactions] = useState(() => {
                try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
            });
            const [month, setMonth] = useState(new Date().getMonth());
            const [year,  setYear]  = useState(new Date().getFullYear());
            const [incAmount, setIncAmount] = useState('');
            const [incCat,    setIncCat]    = useState(INCOME_CATS[0]);
            const [incNote,   setIncNote]   = useState('');
            const [expAmount, setExpAmount] = useState('');
            const [expCat,    setExpCat]    = useState(EXPENSE_CATS[0]);
            const [expNote,   setExpNote]   = useState('');
            const [showSettings, setShowSettings] = useState(false);

            useEffect(() => { localStorage.setItem(KEY, JSON.stringify(transactions)); }, [transactions]);

            const addTx = useCallback((type) => {
                const amount = parseFloat(type === 'income' ? incAmount : expAmount);
                if (isNaN(amount) || amount <= 0) return;
                const cat  = type === 'income' ? incCat  : expCat;
                const note = type === 'income' ? incNote : expNote;
                const now  = new Date();
                const d    = new Date(year, month, now.getDate(), now.getHours(), now.getMinutes());
                setTransactions(prev => [{
                    id: Date.now().toString(36) + Math.random().toString(36).slice(2),
                    amount, type,
                    category: note.trim() ? cat + ' (' + note.trim() + ')' : cat,
                    date: d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric' }),
                    timestamp: d.getTime()
                }, ...prev]);
                if (type === 'income') { setIncAmount(''); setIncNote(''); }
                else                   { setExpAmount(''); setExpNote(''); }
            }, [incAmount, expAmount, incCat, expCat, incNote, expNote, year, month]);

            const deleteTx = useCallback((id) => setTransactions(prev => prev.filter(t => t.id !== id)), []);

            const clearAll = () => {
                if (confirm('Удалить все записи? Это нельзя отменить.')) setTransactions([]);
            };

            const filtered = useMemo(() =>
                transactions
                    .filter(t => { const d = new Date(t.timestamp); return d.getMonth() === month && d.getFullYear() === year; })
                    .sort((a, b) => b.timestamp - a.timestamp)
            , [transactions, month, year]);

            const totals = useMemo(() => {
                const inc = filtered.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
                const exp = filtered.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
                return { inc, exp, bal: inc - exp };
            }, [filtered]);

            const annual = useMemo(() => {
                const yt = transactions.filter(t => new Date(t.timestamp).getFullYear() === year);
                const inc = yt.filter(t => t.type === 'income').reduce((s,t) => s+t.amount, 0);
                const exp = yt.filter(t => t.type === 'expense').reduce((s,t) => s+t.amount, 0);
                return { inc, exp, bal: inc - exp };
            }, [transactions, year]);

            const mn = MONTHS[month];
            const incFiltered = filtered.filter(t => t.type === 'income');
            const expFiltered = filtered.filter(t => t.type === 'expense');

            return React.createElement('div', { style: { maxWidth: 520, margin: '0 auto', padding: '20px 14px 60px' } },

                // ── Header ──
                React.createElement('div', {
                    className: 'fade-up',
                    style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 22 }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
                        React.createElement('div', { style: { width: 46, height: 46, borderRadius: 14, background: 'rgba(30,122,62,0.12)', display: 'flex', alignItems: 'center', justifyContent: 'center' } },
                            React.createElement(Ico, { name: 'leaf', size: 24, stroke: '#1E7A3E' })),
                        React.createElement('div', null,
                            React.createElement('h1', { className: 'font-serif', style: { fontSize: '1.3rem', fontWeight: 800, color: '#1A3C2A', lineHeight: 1 } }, 'Зелёный Учёт'),
                            React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, letterSpacing: '0.1em', color: '#5A9A70', marginTop: 3 } }, 'МАСТЕРСКАЯ ПО ОЗЕЛЕНЕНИЮ')
                        )
                    ),
                    React.createElement('button', {
                        onClick: () => setShowSettings(true),
                        style: { width: 44, height: 44, borderRadius: 13, background: 'white', border: '1.5px solid #C8E6C0', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', boxShadow: '0 1px 4px rgba(30,90,40,0.08)' }
                    }, React.createElement(Ico, { name: 'gear', size: 18, stroke: '#3A7A50' }))
                ),

                // ── Year + Month ──
                React.createElement('div', {
                    className: 'card-base card-surface fade-up',
                    style: { animationDelay: '0.05s' }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 } },
                        React.createElement('button', {
                            onClick: () => setYear(y => y-1),
                            style: { padding: '5px 10px', borderRadius: 9, background: '#F3FAF0', border: '1px solid #C8E6C0', color: '#1A3C2A', cursor: 'pointer', fontWeight: 700 }
                        }, '←'),
                        React.createElement('span', { style: { fontWeight: 900, fontSize: '1.5rem', color: '#1A3C2A', flex: 1 } }, year),
                        React.createElement('button', { className: 'btn-today', onClick: () => { setMonth(new Date().getMonth()); setYear(new Date().getFullYear()); } }, 'сегодня'),
                        React.createElement('button', {
                            onClick: () => setYear(y => y+1),
                            style: { padding: '5px 10px', borderRadius: 9, background: '#F3FAF0', border: '1px solid #C8E6C0', color: '#1A3C2A', cursor: 'pointer', fontWeight: 700 }
                        }, '→')
                    ),
                    React.createElement('div', { className: 'month-tabs' },
                        MONTHS.map((m, i) => React.createElement('button', {
                            key: m, onClick: () => setMonth(i),
                            className: 'month-tab' + (i === month ? ' active' : '')
                        }, m))
                    )
                ),

                // ── Income Card ──
                React.createElement('div', { className: 'card-base card-income fade-up', style: { animationDelay: '0.1s' } },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 18 } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Общий доход за ' + mn),
                            React.createElement('p', { style: { fontSize: '2.4rem', fontWeight: 900, lineHeight: 1.1 } }, fmt(totals.inc), '\u00a0₽')
                        ),
                        React.createElement(Ico, { name: 'trendUp', size: 26, stroke: 'rgba(255,255,255,0.7)' })
                    ),
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 11 } },
                        React.createElement('div', null,
                            React.createElement('label', { className: 'field-label' }, 'Сумма, ₽'),
                            React.createElement('input', { type: 'number', placeholder: '0', value: incAmount, onChange: e => setIncAmount(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('income'), className: 'field-input' })
                        ),
                        React.createElement('div', null,
                            React.createElement('label', { className: 'field-label' }, 'Категория'),
                            React.createElement('select', { value: incCat, onChange: e => setIncCat(e.target.value), className: 'field-input' },
                                INCOME_CATS.map(c => React.createElement('option', { key: c, value: c }, c)))
                        ),
                        React.createElement('div', null,
                            React.createElement('label', { className: 'field-label' }, 'Примечание'),
                            React.createElement('input', { type: 'text', placeholder: 'Название / Проект / Сад...', value: incNote, onChange: e => setIncNote(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('income'), className: 'field-input' })
                        ),
                        React.createElement('button', {
                            className: 'btn-primary', onClick: () => addTx('income'),
                            style: { background: '#8FD44A', color: '#1A3C2A' }
                        },
                            React.createElement(Ico, { name: 'plus', size: 18, stroke: '#1A3C2A' }),
                            'Добавить доход'
                        )
                    ),
                    React.createElement('div', { style: { marginTop: 20, borderTop: '1px solid rgba(255,255,255,0.15)', paddingTop: 16 } },

                        incFiltered.length === 0
                            ? React.createElement('p', { style: { fontSize: '0.82rem', opacity: 0.4, fontStyle: 'italic' } }, 'Доходов за этот месяц нет')
                            : incFiltered.map(t => React.createElement(TxRow, { key: t.id, t, onDelete: deleteTx, onLight: false }))
                    )
                ),

                // ── Expense Card ──
                React.createElement('div', { className: 'card-base card-expense fade-up', style: { animationDelay: '0.15s' } },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 18 } },
                        React.createElement('div', null,
                            React.createElement('p', { className: 'field-label' }, 'Потрачено в ' + mn),
                            React.createElement('p', { style: { fontSize: '2.4rem', fontWeight: 900, lineHeight: 1.1 } }, fmt(totals.exp), '\u00a0₽')
                        ),
                        React.createElement(Ico, { name: 'trendDn', size: 26, stroke: 'rgba(255,255,255,0.7)' })
                    ),
                    React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 11 } },
                        React.createElement('div', null,
                            React.createElement('label', { className: 'field-label' }, 'Сумма, ₽'),
                            React.createElement('input', { type: 'number', placeholder: '0', value: expAmount, onChange: e => setExpAmount(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('expense'), className: 'field-input' })
                        ),
                        React.createElement('div', null,
                            React.createElement('label', { className: 'field-label' }, 'Категория'),
                            React.createElement('select', { value: expCat, onChange: e => setExpCat(e.target.value), className: 'field-input' },
                                EXPENSE_CATS.map(c => React.createElement('option', { key: c, value: c }, c)))
                        ),
                        React.createElement('div', null,
                            React.createElement('label', { className: 'field-label' }, 'Детали расхода'),
                            React.createElement('input', { type: 'text', placeholder: 'За что именно...', value: expNote, onChange: e => setExpNote(e.target.value), onKeyDown: e => e.key==='Enter' && addTx('expense'), className: 'field-input' })
                        ),
                        React.createElement('button', {
                            className: 'btn-primary', onClick: () => addTx('expense'),
                            style: { background: 'rgba(255,255,255,0.18)', color: 'white', border: '1px solid rgba(255,255,255,0.25)' }
                        },
                            React.createElement(Ico, { name: 'plus', size: 18, stroke: 'white' }),
                            'Добавить расход'
                        )
                    ),
                    React.createElement('div', { style: { marginTop: 20, borderTop: '1px solid rgba(255,255,255,0.15)', paddingTop: 16 } },
                        React.createElement('p', { className: 'field-label', style: { marginBottom: 8 } }, 'История трат (' + mn + ')'),
                        expFiltered.length === 0
                            ? React.createElement('p', { style: { fontSize: '0.82rem', opacity: 0.4, fontStyle: 'italic' } }, 'Расходов за этот месяц нет')
                            : expFiltered.map(t => React.createElement(TxRow, { key: t.id, t, onDelete: deleteTx, onLight: false }))
                    )
                ),

                // ── Balance ──
                React.createElement('div', {
                    className: 'card-base card-surface fade-up',
                    style: { animationDelay: '0.2s' }
                },
                    React.createElement('p', { style: { fontSize: '0.65rem', fontWeight: 700, letterSpacing: '0.09em', textTransform: 'uppercase', color: '#6A9A7A', marginBottom: 12 } }, 'Итоги за ' + mn),
                    React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginBottom: 14 } },
                        React.createElement('div', { style: { background: '#F0FBF0', borderRadius: 12, padding: '12px 14px' } },
                            React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#5A9A70', marginBottom: 4 } }, 'Доходы'),
                            React.createElement('p', { style: { fontWeight: 900, fontSize: '1.1rem', color: '#1E7A3E' } }, fmt(totals.inc), '\u00a0₽')
                        ),
                        React.createElement('div', { style: { background: '#FFF5F0', borderRadius: 12, padding: '12px 14px' } },
                            React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#B06040', marginBottom: 4 } }, 'Расходы'),
                            React.createElement('p', { style: { fontWeight: 900, fontSize: '1.1rem', color: '#E8560A' } }, fmt(totals.exp), '\u00a0₽')
                        )
                    ),
                    React.createElement('div', { style: { borderTop: '1px solid #E8F0E8', paddingTop: 12 } },
                        React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, textTransform: 'uppercase', letterSpacing: '0.07em', color: '#6A9A7A', marginBottom: 4 } }, 'Остаток'),
                        React.createElement('p', { style: { fontSize: '2rem', fontWeight: 900, color: totals.bal >= 0 ? '#1E7A3E' : '#C44008' } },
                            totals.bal < 0 ? '−' : '', fmt(totals.bal), '\u00a0₽')
                    )
                ),

                // ── Annual Report ──
                React.createElement('div', {
                    className: 'card-base card-surface fade-up',
                    style: { animationDelay: '0.25s' }
                },
                    React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 16 } },
                        React.createElement(Ico, { name: 'scale', size: 16, stroke: '#1E7A3E' }),
                        React.createElement('p', { style: { fontSize: '0.65rem', fontWeight: 700, letterSpacing: '0.09em', textTransform: 'uppercase', color: '#6A9A7A' } }, 'Годовой отчёт ' + year)
                    ),
                    React.createElement('div', { style: { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8, textAlign: 'center' } },
                        React.createElement('div', { style: { background: '#F0FBF0', borderRadius: 12, padding: '12px 8px' } },
                            React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, color: '#5A9A70', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 4 } }, 'Доходы'),
                            React.createElement('p', { style: { fontWeight: 900, color: '#1E7A3E', fontSize: '0.95rem' } }, fmt(annual.inc), '\u00a0₽')
                        ),
                        React.createElement('div', { style: { background: '#FFF5F0', borderRadius: 12, padding: '12px 8px' } },
                            React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, color: '#B06040', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 4 } }, 'Расходы'),
                            React.createElement('p', { style: { fontWeight: 900, color: '#E8560A', fontSize: '0.95rem' } }, fmt(annual.exp), '\u00a0₽')
                        ),
                        React.createElement('div', { style: { background: annual.bal >= 0 ? '#F0FBF0' : '#FFF5F0', borderRadius: 12, padding: '12px 8px' } },
                            React.createElement('p', { style: { fontSize: '0.62rem', fontWeight: 700, color: '#7A9A80', textTransform: 'uppercase', letterSpacing: '0.07em', marginBottom: 4 } }, 'Итого'),
                            React.createElement('p', { style: { fontWeight: 900, color: annual.bal >= 0 ? '#1E7A3E' : '#C44008', fontSize: '0.95rem' } },
                                annual.bal < 0 ? '−' : '', fmt(annual.bal), '\u00a0₽')
                        )
                    )
                ),

                // ── Clear Button ──
                React.createElement('button', {
                    className: 'btn-clear fade-up',
                    style: { animationDelay: '0.3s' },
                    onClick: clearAll
                },
                    React.createElement(Ico, { name: 'trash', size: 16, stroke: '#C44008' }),
                    'Очистить данные'
                ),

                // ── Settings Modal ──
                showSettings && React.createElement(SettingsModal, {
                    transactions, setTransactions, onClose: () => setShowSettings(false)
                })
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
